<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111318;
    --surface: #1a1d24;
    --card: #1f2330;
    --border: #2e3245;
    --brand: #d4851a;
    --brand-glow: rgba(212,133,26,0.15);
    --text: #dde1f0;
    --muted: #7a80a0;
    --accent: #5b8ef0;
    --green: #4cbb7a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
  }

  /* ── HOMEPAGE ── */
  #home-view { display: block; }
  #game-view  { display: none; }

  /* NAV */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: 26px;
    color: var(--brand);
    letter-spacing: 0.5px;
    user-select: none;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap input {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 16px 7px 36px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    width: 200px;
    outline: none;
    transition: border-color 0.2s, width 0.2s;
  }

  .search-wrap input:focus {
    border-color: var(--accent);
    width: 240px;
  }

  .search-wrap input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }

  /* CATEGORIES */
  .categories {
    max-width: 1100px;
    margin: 1.5rem auto 0;
    padding: 0 2rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .cat-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .cat-btn:hover, .cat-btn.active {
    background: var(--brand);
    border-color: var(--brand);
    color: #111;
  }

  /* SECTION */
  .section {
    max-width: 1100px;
    margin: 2.5rem auto 0;
    padding: 0 2rem;
  }

  .section-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* GAME GRID */
  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1.25rem;
    padding-bottom: 4rem;
  }

  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
    text-decoration: none;
    color: inherit;
  }

  .game-card:hover {
    transform: translateY(-5px);
    border-color: var(--brand);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4), 0 0 0 1px var(--brand);
  }

  .game-card:hover .play-overlay {
    opacity: 1;
  }

  .card-thumb {
    aspect-ratio: 4/3;
    position: relative;
    overflow: hidden;
  }

  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* CSS art for games without real thumbnails */
  .thumb-flappy {
    background: linear-gradient(180deg, #4ec0ca 0%, #4ec0ca 55%, #ded895 55%, #ded895 75%, #5a8c2e 75%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
  }

  .thumb-snake {
    background: #0d1f0d;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
  }

  .thumb-2048 {
    background: #faf8ef;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 42px;
    color: #776e65;
  }

  .thumb-tetris {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
  }

  .play-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .play-circle {
    width: 48px;
    height: 48px;
    background: var(--brand);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    padding-left: 3px;
  }

  .card-info {
    padding: 0.75rem 0.9rem;
  }

  .card-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-tag {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── GAME VIEW ── */
  #game-view {
    min-height: 100vh;
    flex-direction: column;
  }

  .game-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    height: 60px;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .back-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .back-btn:hover {
    border-color: var(--brand);
    background: var(--brand-glow);
  }

  .game-nav .logo { font-size: 22px; }

  .game-title-nav {
    font-size: 15px;
    font-weight: 700;
    color: var(--muted);
  }

  .game-title-nav span { color: var(--text); }

  /* Game frame area */
  .game-stage {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 2rem;
    min-height: calc(100vh - 60px);
  }

  .game-frame-wrap {
    position: relative;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    width: min(820px, 100%);
    aspect-ratio: 4/3;
  }

  .game-frame-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Maximize button */
  .maximize-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    z-index: 10;
    color: white;
    font-size: 14px;
  }

  .maximize-btn:hover {
    background: var(--brand);
    border-color: var(--brand);
  }

  /* Fullscreen state */
  .game-frame-wrap.fullscreen {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    aspect-ratio: unset;
    border-radius: 0;
    border: none;
    z-index: 9999;
  }

  /* Loading state */
  .frame-loading {
    position: absolute;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .frame-loading.hidden { opacity: 0; }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 13px;
    color: var(--muted);
    font-weight: 700;
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    display: none;
  }

  .no-results .emoji { font-size: 48px; margin-bottom: 1rem; }
</style>
</head>

<!-- ═══════════════ HOME VIEW ═══════════════ -->
<div id="home-view">

    </div>
  </nav>

  <div class="categories">
    <button class="cat-btn active" onclick="filterCategory('all', this)">All</button>
    <button class="cat-btn" onclick="filterCategory('arcade', this)">Arcade</button>
    <button class="cat-btn" onclick="filterCategory('puzzle', this)">Puzzle</button>
    <button class="cat-btn" onclick="filterCategory('classic', this)">Classic</button>
  </div>

  <div class="section">
    <div class="section-label">All Games</div>
    <div class="game-grid" id="game-grid"></div>
    <div class="no-results" id="no-results">
      <div class="emoji">🎮</div>
      <div>No games found</div>
    </div>
  </div>
</div>

<!-- ═══════════════ GAME VIEW ═══════════════ -->
<div id="game-view">

  <div class="game-stage">

      <div class="frame-loading" id="frame-loading">
        <div class="spinner"></div>
        <div class="loading-text">Loading game...</div>
      </div>
      <iframe id="game-iframe" src="" allowfullscreen></iframe>
      <button class="maximize-btn" id="maximize-btn" onclick="toggleFullscreen()" title="Fullscreen">⤢</button>

</div>

    { id:'yohoho',                        title:'YoHoHo',                      tag:'Arcade',   category:'arcade'  },
  ].map(g => ({ ...g, url: BASE + g.id + '/' }));

  const COLORS = ['#1a3a5c','#1a3d2b','#3d1a2b','#2b1a3d','#3d2b1a','#1a3d3d','#3a1a1a','#1e2a1a'];
  function cardColor(id) { let h=0; for(let c of id) h=(h*31+c.charCodeAt(0))&0xffff; return COLORS[h%COLORS.length]; }

  const thumbHTML = {};

  let activeCategory = 'all';

  function renderGames(list) {
    const grid = document.getElementById('game-grid');
    const noResults = document.getElementById('no-results');
    grid.innerHTML = '';
    if (!list.length) { noResults.style.display = 'block'; return; }
    noResults.style.display = 'none';
    list.forEach(g => {
      const card = document.createElement('div');
      card.className = 'game-card';
      card.onclick = () => openGame(g);
      card.innerHTML = `
        <div class="card-thumb">
          <div style="width:100%;height:100%;background:${cardColor(g.id)};display:flex;align-items:center;justify-content:center;padding:12px;">
            <span style="font-family:'Fredoka One',cursive;font-size:clamp(13px,2.5vw,17px);color:rgba(255,255,255,0.9);text-align:center;line-height:1.3;">${g.title}</span>
          </div>
          <div class="play-overlay">
            <div class="play-circle">▶</div>
          </div>
        </div>
        <div class="card-info">
          <div class="card-tag">${g.tag}</div>
        </div>`;
      grid.appendChild(card);
    });
  }

  function filterGames() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = GAMES.filter(g => {
      const matchCat = activeCategory === 'all' || g.category === activeCategory;
      const matchSearch = g.title.toLowerCase().includes(q) || g.tag.toLowerCase().includes(q);
      return matchCat && matchSearch;
    });
    renderGames(filtered);
  }

  function filterCategory(cat, btn) {
    activeCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterGames();
  }

  function openGame(game) {
    document.getElementById('game-title-nav').textContent = game.title;
    document.getElementById('frame-loading').classList.remove('hidden');
    document.getElementById('home-view').style.display = 'none';
    document.getElementById('game-view').style.display = 'flex';
    window.scrollTo(0, 0);
    const iframe = document.getElementById('game-iframe');
    iframe.onload = function() {
      try { document.getElementById('frame-loading').classList.add('hidden'); } catch(e) {}
      iframe.focus();
    };
    iframe.src = game.url;
    iframe.addEventListener('mouseenter', () => iframe.focus());
    iframe.addEventListener('click', () => iframe.focus());
  }

  function goHome() {
    document.getElementById('game-view').style.display = 'none';
    document.getElementById('home-view').style.display = 'block';
    document.getElementById('game-iframe').src = '';
    exitFullscreen();
  }

  function toggleFullscreen() {
    const wrap = document.getElementById('game-frame-wrap');
    const btn  = document.getElementById('maximize-btn');
    const isFs = wrap.classList.toggle('fullscreen');
    btn.textContent = isFs ? '✕' : '⤢';
    btn.title = isFs ? 'Exit Fullscreen' : 'Fullscreen';
    document.body.style.overflow = isFs ? 'hidden' : '';
  }

  function exitFullscreen() {
    const wrap = document.getElementById('game-frame-wrap');
    wrap.classList.remove('fullscreen');
    document.getElementById('maximize-btn').textContent = '⤢';
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') exitFullscreen();
  });

  renderGames(GAMES);
</script>
</body>
</html>
